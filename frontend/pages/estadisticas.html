<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Estadísticas — No Me Olvides</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar"><span class="topbar-title">Estadísticas</span></div>
    <div class="page-body">
      <div class="page-header">
        <div><div class="page-title">Panel de Estadísticas</div><div class="page-sub">Métricas anónimas de impacto social</div></div>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total NNA Registrados</div><div class="stat-value" id="s-total">—</div></div>
        <div class="stat-card"><div class="stat-label">Sin Proceso</div><div class="stat-value" id="s-sin">—</div></div>
        <div class="stat-card"><div class="stat-label">En Proceso</div><div class="stat-value" id="s-en">—</div></div>
        <div class="stat-card"><div class="stat-label">Concluidos</div><div class="stat-value" id="s-con">—</div></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem;">
        <div class="card">
          <div class="form-section-title" style="margin-bottom:1rem;">Tipo de Violencia</div>
          <div id="violencia-chart"></div>
        </div>
        <div class="card">
          <div class="form-section-title" style="margin-bottom:1rem;">Tipo de Víctima</div>
          <div id="victima-chart"></div>
        </div>
      </div>

      <div class="card">
        <div class="form-section-title" style="margin-bottom:1rem;">Daños Reportados</div>
        <div id="danos-chart"></div>
      </div>
    </div>
  </div>
</div>
<script src="../js/auth.js"></script>
<script>
  requireAuth();
  document.getElementById('sidebar').innerHTML = renderSidebar('stats');

  function barChart(containerId, data) {
    const max = Math.max(...data.map(d=>d.value), 1);
    document.getElementById(containerId).innerHTML = data.map(d => `
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:.75rem;">
        <span style="font-size:.8rem;color:var(--text-2);width:120px;flex-shrink:0;">${d.label}</span>
        <div style="flex:1;background:rgba(255,255,255,.06);border-radius:4px;height:24px;overflow:hidden;">
          <div style="width:${(d.value/max)*100}%;background:linear-gradient(90deg,#63b39d,#4a9080);height:100%;border-radius:4px;display:flex;align-items:center;padding-left:.5rem;">
            <span style="font-size:.75rem;color:#fff;font-weight:600;">${d.value}</span>
          </div>
        </div>
      </div>`).join('');
  }

  async function cargar() {
    const nna = await fetch(`${API}/api/nna`, { headers: authHeaders() }).then(r=>r.json()).catch(()=>[]);
    if (!Array.isArray(nna)) return;

    document.getElementById('s-total').textContent = nna.length;
    document.getElementById('s-sin').textContent = nna.filter(n=>n.estatus==='sin_proceso').length;
    document.getElementById('s-en').textContent = nna.filter(n=>n.estatus==='en_proceso').length;
    document.getElementById('s-con').textContent = nna.filter(n=>n.estatus==='concluido').length;

    const countBy = (key) => {
      const counts = {};
      nna.forEach(n => { const v = n[key]||'No especificado'; counts[v] = (counts[v]||0)+1; });
      return Object.entries(counts).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value);
    };

    barChart('violencia-chart', countBy('tipo_violencia'));
    barChart('victima-chart', countBy('tipo_victima'));

    const danos = [
      { label:'Físico',       value: nna.filter(n=>n.dano_fisico).length },
      { label:'Psicológico',  value: nna.filter(n=>n.dano_psicologico).length },
      { label:'Patrimonial',  value: nna.filter(n=>n.dano_patrimonial).length },
      { label:'Sexual',       value: nna.filter(n=>n.dano_sexual).length },
    ];
    barChart('danos-chart', danos);
  }

  cargar();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Editar Expediente — No Me Olvides</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar"><span class="topbar-title">NNA</span><span class="topbar-breadcrumb">/ Editar Expediente</span></div>
    <div class="page-body">
      <div class="page-header">
        <div><div class="page-title">Editar Expediente</div><div class="page-sub" id="sub">Cargando...</div></div>
        <div style="display:flex;gap:.75rem;">
          <button class="btn btn-ghost" onclick="history.back()">← Volver</button>
          <button class="btn btn-danger" onclick="eliminar()">🗑 Eliminar</button>
        </div>
      </div>
      <div id="alert"></div>
      <div class="card">
        <div class="form-section">
          <div class="form-section-title">I. Datos de la Víctima</div>
          <div class="form-grid">
            <div class="form-group"><label>Nombre(s) *</label><input id="nombre" type="text"/></div>
            <div class="form-group"><label>Primer Apellido *</label><input id="p_apellido" type="text"/></div>
            <div class="form-group"><label>Segundo Apellido</label><input id="s_apellido" type="text"/></div>
            <div class="form-group"><label>Fecha de Nacimiento</label><input id="fecha_nac" type="date"/></div>
            <div class="form-group"><label>Sexo</label><select id="sexo"><option value="">Seleccionar</option><option>Hombre</option><option>Mujer</option><option>Otro</option></select></div>
            <div class="form-group"><label>CURP</label><input id="curp" type="text"/></div>
            <div class="form-group"><label>Tipo de Víctima</label>
              <select id="tipo_victima"><option value="">Seleccionar</option><option value="directa">Directa</option><option value="indirecta">Indirecta</option><option value="ofendido">Ofendido</option></select>
            </div>
            <div class="form-group"><label>Tipo de Violencia</label>
              <select id="tipo_violencia"><option value="">Seleccionar</option><option value="psicologica">Psicológica</option><option value="fisica">Física</option><option value="economica">Económica</option><option value="sexual">Sexual</option><option value="feminicida">Feminicida</option><option value="otro">Otro</option></select>
            </div>
          </div>
        </div>
        <div class="form-section">
          <div class="form-section-title">Relato de los Hechos</div>
          <div class="form-group"><textarea id="relato" rows="5"></textarea></div>
        </div>
        <div class="form-section">
          <div class="form-section-title">VI. Daño Sufrido</div>
          <div style="display:flex;gap:1.5rem;flex-wrap:wrap;">
            <label class="checkbox-group"><input type="checkbox" id="dano_fisico"/> Físico</label>
            <label class="checkbox-group"><input type="checkbox" id="dano_psicologico"/> Psicológico</label>
            <label class="checkbox-group"><input type="checkbox" id="dano_patrimonial"/> Patrimonial</label>
            <label class="checkbox-group"><input type="checkbox" id="dano_sexual"/> Sexual</label>
          </div>
        </div>
        <div class="form-section">
          <div class="form-section-title">VIII. Información Complementaria</div>
          <div class="form-grid">
            <div class="form-group"><label>Nombre del Tutor</label><input id="nombre_tutor" type="text"/></div>
            <div class="form-group"><label>Contacto Tutor</label><input id="contacto_tutor" type="text"/></div>
            <div class="form-group"><label>¿Habla Español?</label><select id="habla_espanol"><option value="true">Sí</option><option value="false">No</option></select></div>
            <div class="form-group"><label>¿Requiere Traductor?</label><select id="requiere_traductor"><option value="false">No</option><option value="true">Sí</option></select></div>
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:1rem;margin-top:1rem;">
          <button class="btn btn-ghost" onclick="history.back()">Cancelar</button>
          <button class="btn btn-primary" onclick="guardar()">Guardar Cambios</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../../js/auth.js"></script>
<script>
  requireAuth();
  document.getElementById('sidebar').innerHTML = renderSidebar('nna');
  const id = new URLSearchParams(location.search).get('id');

  async function cargar() {
    const n = await fetch(`${API}/api/nna/${id}`, { headers: authHeaders() }).then(r=>r.json());
    document.getElementById('sub').textContent = `${n.nombre} ${n.primer_apellido}`;
    document.getElementById('nombre').value = n.nombre||'';
    document.getElementById('p_apellido').value = n.primer_apellido||'';
    document.getElementById('s_apellido').value = n.segundo_apellido||'';
    document.getElementById('fecha_nac').value = n.fecha_nacimiento||'';
    document.getElementById('sexo').value = n.sexo||'';
    document.getElementById('curp').value = n.curp||'';
    document.getElementById('tipo_victima').value = n.tipo_victima||'';
    document.getElementById('tipo_violencia').value = n.tipo_violencia||'';
    document.getElementById('relato').value = n.relato_hechos||'';
    document.getElementById('dano_fisico').checked = n.dano_fisico||false;
    document.getElementById('dano_psicologico').checked = n.dano_psicologico||false;
    document.getElementById('dano_patrimonial').checked = n.dano_patrimonial||false;
    document.getElementById('dano_sexual').checked = n.dano_sexual||false;
    document.getElementById('nombre_tutor').value = n.nombre_tutor||'';
    document.getElementById('contacto_tutor').value = n.contacto_tutor||'';
    document.getElementById('habla_espanol').value = n.habla_espanol ? 'true' : 'false';
    document.getElementById('requiere_traductor').value = n.requiere_traductor ? 'true' : 'false';
  }

  async function guardar() {
    const body = {
      nombre: document.getElementById('nombre').value,
      primer_apellido: document.getElementById('p_apellido').value,
      segundo_apellido: document.getElementById('s_apellido').value,
      fecha_nacimiento: document.getElementById('fecha_nac').value,
      sexo: document.getElementById('sexo').value,
      curp: document.getElementById('curp').value,
      tipo_victima: document.getElementById('tipo_victima').value,
      tipo_violencia: document.getElementById('tipo_violencia').value,
      relato_hechos: document.getElementById('relato').value,
      dano_fisico: document.getElementById('dano_fisico').checked,
      dano_psicologico: document.getElementById('dano_psicologico').checked,
      dano_patrimonial: document.getElementById('dano_patrimonial').checked,
      dano_sexual: document.getElementById('dano_sexual').checked,
      nombre_tutor: document.getElementById('nombre_tutor').value,
      contacto_tutor: document.getElementById('contacto_tutor').value,
      habla_espanol: document.getElementById('habla_espanol').value === 'true',
      requiere_traductor: document.getElementById('requiere_traductor').value === 'true',
    };
    const res = await fetch(`${API}/api/nna/${id}`, { method:'PUT', headers:authHeaders(), body:JSON.stringify(body) });
    if (res.ok) { showAlert('Cambios guardados', 'success'); setTimeout(()=>location.href=`ver-nna.html?id=${id}`, 1500); }
    else { showAlert('Error al guardar', 'error'); }
  }

  async function eliminar() {
    if (!confirm('¿Eliminar este expediente permanentemente?')) return;
    await fetch(`${API}/api/nna/${id}`, { method:'DELETE', headers:authHeaders() });
    location.href = 'lista-nna.html';
  }

  function showAlert(msg, tipo) {
    document.getElementById('alert').innerHTML = `<div class="alert alert-${tipo==='error'?'error':'success'}" style="margin-bottom:1rem;">${msg}</div>`;
  }

  cargar();
</script>
</body>
</html>

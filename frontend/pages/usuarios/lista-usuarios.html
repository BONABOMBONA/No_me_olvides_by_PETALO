<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Personal — No Me Olvides</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar"><span class="topbar-title">Personal</span></div>
    <div class="page-body">
      <div class="page-header">
        <div><div class="page-title">Usuarios</div><div class="page-sub">Gestión del personal de la fundación</div></div>
        <button class="btn btn-primary" onclick="location.href='registro-usuario.html'">+ Nuevo Usuario</button>
      </div>
      <div class="tabs">
        <div class="tab active" onclick="cambiarTab('todos',this)">Todos</div>
        <div class="tab" onclick="cambiarTab('pendientes',this)">Pendientes ⚠️</div>
        <div class="tab" onclick="cambiarTab('activos',this)">Activos</div>
        <div class="tab" onclick="cambiarTab('restringidos',this)">Restringidos</div>
      </div>
      <div class="table-wrap">
        <div class="table-header">
          <span class="table-title">Lista de personal</span>
          <span class="table-count" id="count">0</span>
          <div class="search-bar"><span>🔍</span><input type="text" id="search" placeholder="Buscar por nombre o RFC..." oninput="filtrar()"/></div>
        </div>
        <table>
          <thead><tr><th>Nombre</th><th>RFC</th><th>Rol</th><th>Tipo</th><th>Estado</th><th>Acciones</th></tr></thead>
          <tbody id="tabla"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="../../js/auth.js"></script>
<script>
  requireAuth(); requireDirector();
  document.getElementById('sidebar').innerHTML = renderSidebar('usuarios');
  let todos = [], tabActual = 'todos';

  const bEstado = { activo:'badge-active', inactivo:'badge-inactive', pendiente:'badge-pending', restringido:'badge-inactive' };

  async function cargar() {
    todos = await fetch(`${API}/api/usuarios`, { headers: authHeaders() }).then(r=>r.json()).catch(()=>[]);
    renderTabla();
  }

  function cambiarTab(tab, el) {
    tabActual = tab;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    renderTabla();
  }

  function filtrar() { renderTabla(); }

  function renderTabla() {
    const q = document.getElementById('search').value.toLowerCase();
    let data = Array.isArray(todos) ? todos : [];
    if (tabActual !== 'todos') {
      const map = { pendientes:'pendiente', activos:'activo', restringidos:'restringido' };
      data = data.filter(u => u.estado === map[tabActual]);
    }
    if (q) data = data.filter(u => `${u.nombre} ${u.primer_apellido} ${u.rfc||''}`.toLowerCase().includes(q));
    document.getElementById('count').textContent = data.length;
    document.getElementById('tabla').innerHTML = data.length === 0
      ? `<tr><td colspan="6"><div class="empty"><div class="empty-icon">👥</div><div class="empty-text">No hay usuarios</div></div></td></tr>`
      : data.map(u=>`
        <tr>
          <td class="name">${u.nombre} ${u.primer_apellido||''}</td>
          <td>${u.rfc||'—'}</td>
          <td>${u.rol||'—'}</td>
          <td>${u.tipo||'—'}</td>
          <td><span class="badge ${bEstado[u.estado]||''}">${u.estado}</span></td>
          <td style="display:flex;gap:.5rem;flex-wrap:wrap;">
            <button class="btn btn-secondary btn-sm" onclick="location.href='ver-usuario.html?id=${u.id}'">Ver</button>
            <button class="btn btn-ghost btn-sm" onclick="location.href='editar-usuario.html?id=${u.id}'">Editar</button>
            <button class="btn btn-danger btn-sm" onclick="restringir(${u.id})">${u.estado==='restringido'?'Activar':'Restringir'}</button>
          </td>
        </tr>`).join('');
  }

  async function restringir(id) {
    if (!confirm('¿Confirmar cambio de acceso?')) return;
    await fetch(`${API}/api/usuarios/${id}/restringir`, { method:'PUT', headers:authHeaders() });
    cargar();
  }

  cargar();
</script>
</body>
</html>
